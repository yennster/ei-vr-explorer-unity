name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required repo secrets (Settings → Secrets and variables → Actions):
#   UNITY_LICENSE   contents of the .ulf license file (see one-time setup below)
#   UNITY_EMAIL     the Unity account email
#   UNITY_PASSWORD  the Unity account password
#
# One-time setup to obtain UNITY_LICENSE:
#   1. Run `game-ci/unity-request-activation-file` once locally or in a temp
#      action; it produces an `Unity_v6000.x.alf` request file.
#   2. Upload that .alf to https://license.unity3d.com/manual to get a `.ulf`.
#   3. Paste the .ulf contents into the UNITY_LICENSE secret.
# See https://game.ci/docs/github/activation for the canonical guide.

jobs:
  test:
    name: Edit-mode tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          testMode: editmode
          customParameters: -nographics
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;assemblyFilters:+EI.VR.Dsp,-EI.VR.Dsp.Tests'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-results
          path: artifacts
